# ═══════════════════════════════════════════════════════
# BTT Eddy USB — Klipper mainline configuration
# Optimised for max precision : multi-sample median everywhere
# Aligned with official Klipper documentation + PR #7179
# https://www.klipper3d.org/Eddy_Probe.html
# ═══════════════════════════════════════════════════════

[mcu eddy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_50445059303E9B1C-if00
restart_method: command

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[probe_eddy_current btt_eddy]
sensor_type: ldc1612
descend_z: 0.5
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: 22.0
y_offset: 0.0
# Tap parameters — populated after PROBE_EDDY_CURRENT_CALIBRATE @ hot
tap_threshold: 28

[temperature_probe btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26
horizontal_move_z: 2


# ═══════════════════════════════════════════════════════
# OFFICIAL KLIPPER HOMING CORRECTION MACROS
# https://www.klipper3d.org/Eddy_Probe.html#homing-correction-macros
# ═══════════════════════════════════════════════════════

[gcode_macro _RELOAD_Z_OFFSET_FROM_PROBE]
description: Internal — re-set kinematic Z=0 from the last probe position
gcode:
    {% set Z = printer.toolhead.position.z %}
    SET_KINEMATIC_POSITION Z={Z - printer.probe.last_probe_position.z}


# ═══════════════════════════════════════════════════════
# SET_Z_FROM_PROBE
# Refines Z=0 with the median of N samples.
# Dispatches to a manual tap loop for METHOD=tap (workaround for
# Klipper bug where samples_retract_dist=0 is hardcoded for tap),
# or to the native PROBE for scan/rapid_scan/automatic.
# ═══════════════════════════════════════════════════════

[gcode_macro SET_Z_FROM_PROBE]
description: Refine Z=0 with median of N samples (handles Klipper tap bug via manual loop)
gcode:
    {% set METHOD = params.METHOD | default("automatic") | lower %}
    {% set SAMPLES = params.SAMPLES | default(5) | int %}
    {% if METHOD == 'tap' %}
        # Klipper bug: SAMPLES>1 + tap fails (samples_retract_dist=0 hardcoded)
        # → manual loop with lift between each sample
        _SET_Z_FROM_PROBE_TAP_MEDIAN SAMPLES={SAMPLES}
    {% else %}
        # scan / rapid_scan / automatic: native SAMPLES works fine
        PROBE METHOD={METHOD} SAMPLES={SAMPLES} SAMPLES_RESULT=median
        _RELOAD_Z_OFFSET_FROM_PROBE
        G0 Z5
    {% endif %}


# ═══════════════════════════════════════════════════════
# Manual multi-tap with median (workaround Klipper bug)
# ═══════════════════════════════════════════════════════

[gcode_macro _SET_Z_FROM_PROBE_TAP_MEDIAN]
description: Internal — N manual taps with retract, computes median, re-sets Z=0
variable_taps_data: []
gcode:
    {% set SAMPLES = params.SAMPLES | default(5) | int %}
    {% set retract = params.RETRACT | default(3) | float %}
    # MANDATORY: lift Z to 10mm before tap (avoid "insufficient slope delta")
    G91
    G1 Z10 F600
    G90
    # Reset accumulator
    SET_GCODE_VARIABLE MACRO=_SET_Z_FROM_PROBE_TAP_MEDIAN VARIABLE=taps_data VALUE="[]"
    # N manual taps with retract between each
    {% for i in range(SAMPLES) %}
        G91
        G0 Z{retract} F300
        G90
        PROBE METHOD=tap
        _RECORD_TAP_SAMPLE
    {% endfor %}
    # Final lift + apply median as new Z=0 reference
    G91
    G0 Z{retract} F300
    G90
    _APPLY_TAP_MEDIAN
    G0 Z5

[gcode_macro _RECORD_TAP_SAMPLE]
description: Internal — append last_z_result to taps_data
gcode:
    {% set last_z = printer.probe.last_z_result|float %}
    {% set existing = printer["gcode_macro _SET_Z_FROM_PROBE_TAP_MEDIAN"].taps_data %}
    {% set new_data = existing + [last_z] %}
    SET_GCODE_VARIABLE MACRO=_SET_Z_FROM_PROBE_TAP_MEDIAN VARIABLE=taps_data VALUE="{new_data}"

[gcode_macro _APPLY_TAP_MEDIAN]
description: Internal — compute median of taps_data and re-set kinematic Z=0
gcode:
    {% set data = printer["gcode_macro _SET_Z_FROM_PROBE_TAP_MEDIAN"].taps_data %}
    {% set n = data|length %}
    {% if n < 1 %}
        RESPOND TYPE=error MSG="_APPLY_TAP_MEDIAN: no samples collected"
    {% else %}
        {% set sorted_data = data|sort %}
        {% if n % 2 == 1 %}
            {% set median = sorted_data[(n - 1) // 2] %}
        {% else %}
            {% set median = (sorted_data[n // 2 - 1] + sorted_data[n // 2]) / 2 %}
        {% endif %}
        {% set mn = data|min %}
        {% set mx = data|max %}
        {% set rng = mx - mn %}
        RESPOND TYPE=command MSG="Tap median over {n} samples: {'%.6f' % median} (range {'%.6f' % rng})"
        # Re-set kinematic Z=0 on the median
        {% set Z = printer.toolhead.position.z %}
        SET_KINEMATIC_POSITION Z={Z - median}
    {% endif %}


# ═══════════════════════════════════════════════════════
# TAP-THEN-SCAN PATTERN (PR #7179)
# Bed mesh in scan mode, thermally compensated by tap.
# Usage in start G-code:
#   SET_SCAN_FROM_TAP
#   BED_MESH_CALIBRATE METHOD=scan HORIZONTAL_MOVE_Z=0.5
# ═══════════════════════════════════════════════════════

[gcode_macro _ADJ_SCAN_FROM_TAP]
description: Internal — apply gcode offset Z = +drift (compensates mesh error)
gcode:
    {% set OFFSET = printer.probe.last_probe_position.z %}
    {% set probe_temp = printer["temperature_probe btt_eddy"].temperature %}
    RESPOND TYPE=command MSG="Scan-from-tap : drift={OFFSET|round(4)} mm @ coil={probe_temp|round(1)}°C"
    # Z= absolute (not Z_ADJUST=) to avoid accumulation across successive calls.
    # POSITIVE sign: +drift compensates the mesh error (the scan sees the bed
    # higher than it actually is, so the mesh over-corrects; we cancel that
    # by lifting the nozzle by +drift).
    SET_GCODE_OFFSET Z={OFFSET}

[gcode_macro SET_SCAN_FROM_TAP]
description: High-precision tap-then-scan (5 taps median + 5 scans median)
gcode:
    # Safety lift (always, simple and safe)
    G91
    G1 Z10 F600
    G90
    # Z=0 via 5 manual taps with median (compensates noise + small variations)
    SET_Z_FROM_PROBE METHOD=tap SAMPLES=5
    # Move to scan position (probe centered above last tap point)
    {% set is_absolute = printer.gcode_move.absolute_coordinates %}
    G90
    {% set cf = printer.configfile.settings %}
    {% set eddy = cf["probe_eddy_current btt_eddy"] %}
    {% set amap = printer.gcode_move.axis_map %}
    {% set tpos = printer.gcode_move.position %}
    G0 Z5 F300
    G0 X{tpos[amap["X"]] - eddy.x_offset} Y{tpos[amap["Y"]] - eddy.y_offset} F3000
    M400
    G4 P200
    G0 Z{eddy.descend_z} F300
    M400
    G4 P200
    # Scan = 5 samples median (multi-sample scan natively works)
    PROBE METHOD=scan SAMPLES=5 SAMPLES_RESULT=median
    _ADJ_SCAN_FROM_TAP
    G0 Z5 F600
    {% if not is_absolute %}
        G91
    {% endif %}


# ═══════════════════════════════════════════════════════
# PROBE_ACCURACY_TAP — diagnostic tool
# Wrapper around PROBE METHOD=tap with proper retract between samples
# (workaround for Klipper bug where samples_retract_dist=0 is hardcoded
# in probe_eddy_current.py for tap method).
# ═══════════════════════════════════════════════════════

[gcode_macro PROBE_ACCURACY_TAP]
description: Probe accuracy diagnostic — N taps with retract, returns median/avg/stddev
variable_samples_data: []
variable_samples_sq_sum: 0.0
gcode:
    {% set samples = params.SAMPLES|default(10)|int %}
    {% set retract = params.SAMPLE_RETRACT_DIST|default(3)|float %}
    {% set tap_threshold = params.TAP_THRESHOLD|default(0)|int %}
    {% set lift_speed = params.LIFT_SPEED|default(5)|float %}

    {% set xpos = printer.toolhead.position.x|float %}
    {% set ypos = printer.toolhead.position.y|float %}
    {% set zpos = printer.toolhead.position.z|float %}

    RESPOND TYPE=command MSG="PROBE_ACCURACY_TAP at X:{xpos|round(3)} Y:{ypos|round(3)} Z:{zpos|round(3)}"
    RESPOND TYPE=command MSG="  (samples={samples} retract={retract} threshold={tap_threshold if tap_threshold > 0 else 'config'})"

    SET_GCODE_VARIABLE MACRO=PROBE_ACCURACY_TAP VARIABLE=samples_data VALUE="[]"
    SET_GCODE_VARIABLE MACRO=PROBE_ACCURACY_TAP VARIABLE=samples_sq_sum VALUE=0.0

    # MANDATORY: lift Z to 10mm before first tap (avoid "insufficient slope delta")
    G91
    G1 Z10 F600
    G90

    {% for i in range(samples) %}
        G91
        G0 Z{retract} F{lift_speed * 60}
        G90
        {% if tap_threshold > 0 %}
            PROBE METHOD=tap TAP_THRESHOLD={tap_threshold}
        {% else %}
            PROBE METHOD=tap
        {% endif %}
        _PROBE_ACCURACY_TAP_RECORD
    {% endfor %}

    G91
    G0 Z{retract} F{lift_speed * 60}
    G90

    _PROBE_ACCURACY_TAP_REPORT

[gcode_macro _PROBE_ACCURACY_TAP_RECORD]
description: Internal helper for PROBE_ACCURACY_TAP — records last_z and accumulates squared sum
gcode:
    {% set last_z = printer.probe.last_z_result|float %}
    {% set existing = printer["gcode_macro PROBE_ACCURACY_TAP"].samples_data %}
    {% set new_data = existing + [last_z] %}
    {% set old_sq = printer["gcode_macro PROBE_ACCURACY_TAP"].samples_sq_sum|float %}
    {% set new_sq = old_sq + last_z * last_z %}
    SET_GCODE_VARIABLE MACRO=PROBE_ACCURACY_TAP VARIABLE=samples_data VALUE="{new_data}"
    SET_GCODE_VARIABLE MACRO=PROBE_ACCURACY_TAP VARIABLE=samples_sq_sum VALUE={new_sq}

[gcode_macro _PROBE_ACCURACY_TAP_REPORT]
description: Internal helper for PROBE_ACCURACY_TAP — computes and reports stats
gcode:
    {% set data = printer["gcode_macro PROBE_ACCURACY_TAP"].samples_data %}
    {% set sum_sq = printer["gcode_macro PROBE_ACCURACY_TAP"].samples_sq_sum|float %}
    {% set n = data|length %}
    {% if n < 1 %}
        RESPOND TYPE=error MSG="PROBE_ACCURACY_TAP: no samples collected"
    {% else %}
        {% set mn = data|min %}
        {% set mx = data|max %}
        {% set rng = mx - mn %}
        {% set avg = (data|sum) / n %}
        {% set variance = (sum_sq / n) - (avg * avg) %}
        {% set stddev = variance ** 0.5 if variance > 0 else 0 %}
        {% set sorted_data = data|sort %}
        {% if n % 2 == 1 %}
            {% set median = sorted_data[(n - 1) // 2] %}
        {% else %}
            {% set median = (sorted_data[n // 2 - 1] + sorted_data[n // 2]) / 2 %}
        {% endif %}
        RESPOND TYPE=command MSG="probe accuracy results: maximum {'%.6f' % mx}, minimum {'%.6f' % mn}, range {'%.6f' % rng}, average {'%.6f' % avg}, median {'%.6f' % median}, standard deviation {'%.6f' % stddev}"
    {% endif %}

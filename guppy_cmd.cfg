# ═══════════════════════════════════════════════════════
# E5M-CK — guppy_cmd.cfg
# Minimal GuppyScreen support (no ADXL-dependent features)
#
# REMOVED (ADXL-dependent, unusable on E5M with stock nozzle MCU 2023):
#   - [gcode_shell_command guppy_input_shaper]
#   - [gcode_shell_command guppy_belts_calibration]
#   - [calibrate_shaper_config]
#   - [gcode_macro GUPPY_SHAPERS]
#   - [gcode_macro GUPPY_BELTS_SHAPER_CALIBRATION]
#   - [gcode_macro GUPPY_EXCITATE_AXIS_AT_FREQ]
#
# REMOVED (filament load/unload moved to macros_E5M_CK.cfg):
#   - [gcode_macro _GUPPY_LOAD_MATERIAL]
#   - [gcode_macro _GUPPY_QUIT_MATERIAL]
#   GuppyScreen calls LOAD_FILAMENT / UNLOAD_FILAMENT directly
#   (configured in guppyconfig.json default_macros).
# ═══════════════════════════════════════════════════════


# ─── Required by GuppyScreen ───────────────────────────

[guppy_module_loader]


# ─── Klipper RESPOND command ───────────────────────────
# Used by macros across the configuration

[respond]
default_type: echo
default_prefix:


# ─── SSH restart utility ───────────────────────────────

[gcode_shell_command GUPPY_K1_SSH_RESTART]
command: /etc/init.d/S50dropbear
timeout: 600.0
verbose: True

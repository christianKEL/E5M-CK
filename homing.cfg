# ═══════════════════════════════════════════════════════
# HOMING — CoreXY sequence with Eddy probe Z refinement
#
# ⚠️  CRITICAL : axis order MUST be Y → X → Z
#    Reversing Y and X causes MECHANICAL CRASH on this E5M.
#    DO NOT swap the order without thorough mechanical review.
#
# Z homing strategy:
#   1. Lift Z=30 first (avoid Eddy saturation / collisions)
#   2. Home Y, then X (mandatory order, see warning above)
#   3. Center toolhead at bed center for Z homing
#   4. Rough Z homing via Eddy virtual_endstop (G28 Z)
#   5. Refine Z=0 via SET_Z_FROM_PROBE METHOD=tap (5-sample median)
#      The macro handles its own Z=10 safety lift internally.
# ═══════════════════════════════════════════════════════

[homing_override]
axes: xyz
set_position_z: 0
gcode:
  G90
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  # Initial Z lift to avoid Eddy saturation / collisions during X/Y homing
  G1 Z30 F600

  # ─── Y axis (must be homed BEFORE X — see header warning) ───
  {% if home_all or 'X' in params or 'Y' in params %}
    G28 Y
    G1 Y400 F2400
  {% endif %}

  # ─── X axis (after Y only) ───
  {% if home_all or 'X' in params %}
    G28 X
    G1 X380 F2400
  {% endif %}

  # ─── Z axis ───
  {% if home_all or 'Z' in params %}
    # Move to bed center for Z homing (best practice)
    G0 X200 Y200 F6000
    # Rough Z homing via Eddy virtual_endstop
    G28 Z
    # Refine Z=0 via tap-based multi-sample median.
    # SET_Z_FROM_PROBE handles its own mandatory Z=10 lift internally.
    SET_Z_FROM_PROBE METHOD=tap
  {% endif %}

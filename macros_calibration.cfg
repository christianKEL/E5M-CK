# ═══════════════════════════════════════════════════════
# CALIBRATION MACROS — Ender 5 Max
# Manual macros for one-shot calibrations (PID, mesh, Eddy, etc.)
# ═══════════════════════════════════════════════════════


# ─── HELPERS ───────────────────────────────────────────
# Used by Eddy calibration workflow (CAL_EDDY_DRIVE_CURRENT, etc.)

[gcode_macro CENTER_TOOLHEAD]
description: Move toolhead to bed center (X=200 Y=200), homing X/Y first
gcode:
    G28 X Y
    G90
    G0 X200 Y200 F6000

[gcode_macro SET_KINEMATIC_Z]
description: Set kinematic Z position (Z= parameter, default 200)
gcode:
    {% set z = params.Z|default(200)|int %}
    SET_KINEMATIC_POSITION Z={z}


# ─── MECHANICAL BED Z LEVELING ─────────────────────────
# Reproduces the Creality stock procedure cmd_CX_HOTBED_QINXIE_CALI.
# All 4 lead screws are ganged on a single stepper_z driver — they
# rotate together. Sync is achieved by driving the bed against the
# lower mechanical stop (steppers skip steps until aligned).
# 
# IMPORTANT: this macro does NOT issue a final G28. After running,
# Klipper has lost the kinematic Z position. Run G28 manually before
# any further Z-related operation. This is the Creality stock behavior.

[gcode_macro CAL_BED_Z_TILT]
description: Mechanical bed Z tilt synchronization (Creality stock procedure)
gcode:
    RESPOND TYPE=command MSG="Starting mechanical Z synchronization..."
    G28 X Y Z
    G1 Z400 F300
    FORCE_MOVE STEPPER=stepper_z DISTANCE=5 VELOCITY=5
    FORCE_MOVE STEPPER=stepper_z DISTANCE=5 VELOCITY=5
    FORCE_MOVE STEPPER=stepper_z DISTANCE=5 VELOCITY=5
    FORCE_MOVE STEPPER=stepper_z DISTANCE=5 VELOCITY=5
    FORCE_MOVE STEPPER=stepper_z DISTANCE=5 VELOCITY=5
    FORCE_MOVE STEPPER=stepper_z DISTANCE=5 VELOCITY=5
    FORCE_MOVE STEPPER=stepper_z DISTANCE=5 VELOCITY=5
    FORCE_MOVE STEPPER=stepper_z DISTANCE=5 VELOCITY=5
    FORCE_MOVE STEPPER=stepper_z DISTANCE=-200 VELOCITY=5
    RESPOND TYPE=command MSG="Mechanical sync complete - run G28 manually before next operation"


# ─── PID CALIBRATION ───────────────────────────────────

[gcode_macro CAL_BED_PID]
description: Bed PID calibration (CAL_BED_PID TEMP=80)
gcode:
    {% set temp = params.TEMP|default(65)|int %}
    RESPOND TYPE=command MSG="Starting bed PID at {temp}C..."
    PID_CALIBRATE HEATER=heater_bed TARGET={temp}
    RESPOND TYPE=command MSG="Bed PID complete - Run SAVE_CONFIG"

[gcode_macro CAL_NOZZLE_PID]
description: Nozzle PID calibration (CAL_NOZZLE_PID TEMP=250)
gcode:
    {% set temp = params.TEMP|default(220)|int %}
    RESPOND TYPE=command MSG="Starting nozzle PID at {temp}C..."
    PID_CALIBRATE HEATER=extruder TARGET={temp}
    RESPOND TYPE=command MSG="Nozzle PID complete - Run SAVE_CONFIG"


# ─── BTT EDDY CALIBRATION ──────────────────────────────

[gcode_macro CAL_EDDY_DRIVE_CURRENT]
description: Calibrate BTT Eddy drive current (manual workflow)
gcode:
    CENTER_TOOLHEAD
    SET_KINEMATIC_Z Z=200
    RESPOND TYPE=command MSG="Toolhead centered, Z set to 200. Lower the bed manually until probe is ~20mm from bed."
    RESPOND TYPE=command MSG="Then run: LDC_CALIBRATE_DRIVE_CURRENT CHIP=btt_eddy"

[gcode_macro CAL_EDDY_MAPPING]
description: Calibrate BTT Eddy height mapping (semi-automated)
gcode:
    BED_MESH_CLEAR
    G28 X Y
    G90
    G1 X200 Y200 F6000
    {% if 'z' not in printer.toolhead.homed_axes %}
        SET_KINEMATIC_POSITION Z=399
    {% endif %}
    RESPOND TYPE=command MSG="Move bed manually until nozzle catches paper"
    RESPOND TYPE=command MSG="Then send: PROBE_EDDY_CURRENT_CALIBRATE CHIP=btt_eddy"
    RESPOND TYPE=command MSG="Follow TESTZ / ACCEPT workflow, then SAVE_CONFIG"


# ─── BED MESH ──────────────────────────────────────────

[gcode_macro CAL_BED_MESH]
description: Quick bed mesh scan (15x15 rapid_scan)
gcode:
    RESPOND TYPE=command MSG="Quick bed mesh scan starting..."
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE METHOD=rapid_scan PROBE_COUNT=15,15
    RESPOND TYPE=command MSG="Quick mesh complete - Run SAVE_CONFIG if needed"

[gcode_macro CAL_BED_MESH_PRECISE]
description: Precise bed mesh scan (25x25 method=scan, slow)
gcode:
    RESPOND TYPE=command MSG="Precise bed mesh scan starting (this will take a while)..."
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE METHOD=scan PROBE_COUNT=25,25
    RESPOND TYPE=command MSG="Precise mesh complete - Run SAVE_CONFIG"

[heater_bed]
pwm_cycle_time: 0.3
heater_pin: PA4 #PB2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control = watermark
control = pid
pid_kp = 30    #37
pid_ki = 0.075 #0.10
pid_kd = 800   #1000
min_temp: -30
max_temp: 110
#temp_offset_flag = True


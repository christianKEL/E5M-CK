# Version: v1.2.10
# ═══════════════════════════════════════════════════════
# E5M-CK — printer.cfg
# Ender 5 Max + BTT Eddy + Klipper mainline
# Mainboard : CR4NS200323C10 (GD32F303RET6)
# Nozzle MCU : CR-NOZZLE_V21 (GD32F303CBT6)
# ═══════════════════════════════════════════════════════

[include macros_calibration.cfg]
[include macros_E5M_CK.cfg]
[include GuppyScreen/*.cfg]
[include eddy.cfg]
[include homing.cfg]
[include gcode_macro.cfg]
# ADXL345 disabled : nozzle MCU firmware (Creality 2023) incompatible
# with Klipper mainline ADXL driver. See repo issue 05.


# ─── MCUs ───
[mcu]
serial: /dev/ttyS1
baud: 230400
restart_method: command

[mcu nozzle_mcu]
serial: /dev/ttyS7
baud: 230400
restart_method: command

[force_move]
enable_force_move: True


# ─── Heaters safety ───
[verify_heater extruder]

[verify_heater heater_bed]
check_gain_time: 120
heating_gain: 1.0
hysteresis: 10


# ─── Input shaper ───
[input_shaper]
shaper_type_x: zv
shaper_freq_x: 50.6
shaper_type_y: mzv
shaper_freq_y: 41.8


# ─── Printer kinematics ───
[printer]
kinematics: corexy
max_velocity: 1000
max_accel: 6500
minimum_cruise_ratio: 0.5
max_z_velocity: 30
square_corner_velocity: 5.0
max_z_accel: 300

[idle_timeout]
timeout: 99999999


# ─── Steppers ───
[stepper_x]
step_pulse_duration: 0.000000501
step_pin: PC2
dir_pin: !PB9
enable_pin: !PC3
microsteps: 32
rotation_distance: 63.874
endstop_pin: !PA11
position_endstop: 400.5
position_min: -5
position_max: 406
homing_speed: 40
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PB12
uart_address: 3
interpolate: True
run_current: 2.0
sense_resistor: 0.150
stealthchop_threshold: 0
diag_pin: ^PB10
driver_SGTHRS: 80

[stepper_y]
step_pulse_duration: 0.000000501
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 32
rotation_distance: 64.024
endstop_pin: !PA12
position_endstop: 401
position_min: -1
position_max: 401
homing_speed: 40
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PB13
uart_address: 3
interpolate: True
run_current: 2.0
sense_resistor: 0.150
stealthchop_threshold: 0
diag_pin: ^PB11
driver_SGTHRS: 80

[stepper_z]
step_pulse_duration: 0.000000501
step_pin: PB6
dir_pin: PB5
enable_pin: !PC3
microsteps: 32
rotation_distance: 3.9930
gear_ratio: 1:1
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0
position_max: 406.5
position_min: -2

[tmc2209 stepper_z]
uart_pin: PB14
uart_address: 3
interpolate: True
run_current: 0.8
sense_resistor: 0.150
stealthchop_threshold: 0
diag_pin: PB0


# ─── Filament runout sensor ───
[filament_switch_sensor filament_sensor]
switch_pin: !PC6
pause_on_runout: true


# ─── Extruder ───
[extruder]
step_pulse_duration: 0.000000501
max_extrude_only_distance: 1000
max_extrude_cross_section: 80
pressure_advance = 0.04
step_pin: nozzle_mcu: PB5
dir_pin: nozzle_mcu: PB4
enable_pin: !nozzle_mcu: PB2
microsteps: 16
rotation_distance: 6.72
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: nozzle_mcu: PB8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: nozzle_mcu: PA0
control = pid
pid_kp = 20.145
pid_ki = 1.919
pid_kd = 52.881
min_temp: 0
max_temp: 320

[tmc2209 extruder]
uart_pin: nozzle_mcu: PB10
uart_address: 3
run_current: 0.6
sense_resistor: 0.15
stealthchop_threshold: 0


# ─── Heated bed ───
[heater_bed]
pwm_cycle_time: 0.3
heater_pin: PA4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control = pid
pid_kp = 30
pid_ki = 0.075
pid_kd = 800
min_temp: -30
max_temp: 110


# ─── Fans ───
[output_pin MainBoardFan]
pin: !PB1

[heater_fan nozzle_fan]
pin: !nozzle_mcu: PB3
max_power: 1.0
shutdown_speed: 0
cycle_time: 0.1
hardware_pwm: False
kick_start_time: 0.100
off_below: 0.0
heater: extruder
fan_speed: 1.0
heater_temp: 60.0

[output_pin en_nozzle_fan]
pin: nozzle_mcu: PB7
pwm: False
value: 1.0

# Front part fan
[output_pin fan0]
pin: !nozzle_mcu: PB15
pwm: True
cycle_time: 0.01
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

[output_pin en_fan0]
pin: nozzle_mcu: PB6
pwm: False
value: 1.0

# Rear part fan
[output_pin fan1]
pin: !nozzle_mcu: PA9
pwm: True
cycle_time: 0.01
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

[output_pin en_fan1]
pin: nozzle_mcu: PB9
pwm: False
value: 1.0


# ─── LEDs ───
[output_pin green_pin]
pin: PA0
value: 0.0

[output_pin red_pin]
pin: PC1
value: 0.0

[output_pin yellow_pin]
pin: PA1
value: 1.0

[output_pin light_pin]
pin: !PC0
value: 0.0


# ─── Bed mesh ───
[bed_mesh]
horizontal_move_z: 1
scan_overshoot: 8
speed: 100
mesh_min: 30.0, 15.0
mesh_max: 391.0, 391.0
probe_count: 15, 15
fade_start: 1.0
fade_end: 20
fade_target: 0
mesh_pps: 4, 4
algorithm: bicubic
bicubic_tension: 0.2

[exclude_object]



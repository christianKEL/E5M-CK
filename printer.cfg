#min_temp: 0
#max_temp: 100


#############FAN OLD CONFIG
[output_pin MainBoardFan]
pin: !PB1


[heater_fan nozzle_fan]
pin: !nozzle_mcu: PB3
max_power: 1.0
shutdown_speed: 0
cycle_time: 0.1
hardware_pwm: False
kick_start_time: 0.100
off_below: 0.0
heater: extruder
fan_speed: 1.0
heater_temp: 60.0
[output_pin en_nozzle_fan]
pin: nozzle_mcu: PB7
pwm: False
value: 1.0

###喷头前面风扇
[output_pin fan0]
pin: !nozzle_mcu:PB15
pwm: True
cycle_time: 0.01
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0
[output_pin en_fan0]
pin: nozzle_mcu: PB6
pwm: False
value: 1.0

###喷头后面风扇
[output_pin fan1]
pin: !nozzle_mcu:PA9
pwm: True
cycle_time: 0.01
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0
[output_pin en_fan1]
pin: nozzle_mcu: PB9
pwm: False
value: 1.0





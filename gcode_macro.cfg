# ═══════════════════════════════════════════════════════
# E5M-CK — gcode_macro.cfg
# Base Klipper + Marlin compatibility + LEDs + PAUSE/RESUME hooks
# ═══════════════════════════════════════════════════════

# ─── Klipper base ──────────────────────────────────────
[virtual_sdcard]
path: /usr/data/printer_data/gcodes

[pause_resume]

[display_status]

[gcode_arcs]
resolution: 1.0


# ─── Marlin compatibility ──────────────────────────────

# M204 — wrapper that forwards S / P / T to native Klipper M204.1
# Kept for compatibility with slicers that send Marlin-style M204
[gcode_macro M204]
rename_existing: M204.1
gcode:
  {% set get_params = "" %}
  {% if 'S' in params|upper %}
    {% set get_params = (get_params + ' ' + 'S' + params.S) %}
  {% endif %}
  {% if 'P' in params|upper %}
    {% set get_params = (get_params + ' ' + 'P' + params.P) %}
  {% endif %}
  {% if 'T' in params|upper %}
    {% set get_params = (get_params + ' ' + 'T' + params.T) %}
  {% endif %}
  M204.1 {get_params}

# M205 — junction deviation / square corner velocity (Marlin compat)
[gcode_macro M205]
gcode:
  {% if 'X' in params %}
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={params.X}
  {% elif 'Y' in params %}
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={params.Y}
  {% endif %}

# M900 — pressure advance (Marlin Linear Advance compat)
[gcode_macro M900]
gcode:
  {% if 'K' in params %}
    {% if 'E' in params %}
      SET_PRESSURE_ADVANCE EXTRUDER={params.E} ADVANCE={params.K}
    {% else %}
      SET_PRESSURE_ADVANCE ADVANCE={params.K}
    {% endif %}
  {% endif %}

# M600 — filament change during print (pause + park + retract sequence)
[gcode_macro M600]
description: Filament change during print (pause + park + unload sequence)
gcode:
    {% set print_state = printer.print_stats.state %}
    {% set print_active = print_state in ['printing', 'paused'] %}
    {% set is_paused = printer.pause_resume.is_paused %}
    {% set is_parked = printer["gcode_macro PARK_FOR_PAUSE"].is_parked|int %}
    
    {% if not print_active %}
        RESPOND TYPE=error MSG="M600: only allowed during a print (use UNLOAD_FILAMENT instead)"
    {% elif not printer.extruder.can_extrude %}
        RESPOND TYPE=error MSG="M600: extruder too cold"
    {% else %}
        # If not already parked, ensure pause + park + state save
        # PARK_FOR_PAUSE handles all states (paused already or not)
        {% if is_parked == 0 %}
            {% if not is_paused %}
                PAUSE
            {% endif %}
            PARK_FOR_PAUSE
        {% endif %}
        # Anti-ringing retract sequence (same as UNLOAD_FILAMENT,
        # without M109/M104 since we stay hot from the print)
        G91
        G1 E-15 F3000
        G1 E-22.4700 F2400
        G1 E-6.4200 F1200
        G1 E-3.2100 F720
        G1 E5.0000 F356
        G1 E-5.0000 F384
        G1 E5.0000 F412
        G1 E-5.0000 F440
        G1 E5.0000 F467
        G1 E-5.0000 F495
        G1 E5.0000 F523
        G1 E-5.0000 F3000
        G1 E-15 F3000
        G90
        RESPOND TYPE=command MSG="M600: filament unloaded - load new with LOAD_FILAMENT then RESUME"
    {% endif %}


# ─── Part fans (M106 / M107) ───────────────────────────
# Creality scaling: fans don't spin below ~30% PWM, so we map
# slicer M106 S<value> through a min-PWM offset.
# fan0_min = 90, fan1_min = 70 (Creality stock values, hardcoded
# here so M106 doesn't depend on the removed PRINTER_PARAM block).

[gcode_macro M106]
description: Fan ON with Creality min-PWM scaling (fan0_min=90, fan1_min=70)
gcode:
  {% set tmp = 255 %}
  {% if params.S is defined %}
    {% set tmp = params.S|int %}
    {% if tmp > 255 %}
      {% set tmp = 255 %}
    {% endif %}
  {% endif %}

  {% if tmp < 1 %}
    # Off
    SET_PIN PIN=fan0 VALUE=0
    SET_PIN PIN=fan1 VALUE=0
  {% else %}
    # Scaled value for fan1 (rear, min=70)
    {% set v1 = 70 + (255 - 70) * tmp / 255 %}
    {% if v1 > 255 %}{% set v1 = 255 %}{% endif %}
    SET_PIN PIN=fan1 VALUE={v1}

    # Scaled value for fan0 (front, min=90)
    {% set v0 = 90 + (255 - 90) * tmp / 255 %}
    {% if v0 > 255 %}{% set v0 = 255 %}{% endif %}
    SET_PIN PIN=fan0 VALUE={v0}
  {% endif %}

[gcode_macro M107]
description: Fan OFF (turns off both part fans)
gcode:
  SET_PIN PIN=fan0 VALUE=0
  SET_PIN PIN=fan1 VALUE=0


# ─── PAUSE / RESUME / CANCEL_PRINT hooks ───────────────
# Lightweight wrappers around native Klipper PAUSE/RESUME/CANCEL_PRINT
# that switch the status LED. The heavy lifting (state save, park,
# retract) is delegated to the native [pause_resume] implementation.

[gcode_macro PAUSE]
description: Pause print and switch LED to yellow
rename_existing: PAUSE_BASE
gcode:
  RED_LED_OFF
  GREEN_LED_OFF
  YELLOW_LED_ON
  PAUSE_BASE {rawparams}

[gcode_macro RESUME]
description: Resume print, restore parked state if needed, switch LED to green
rename_existing: RESUME_BASE
gcode:
    RED_LED_OFF
    GREEN_LED_ON
    YELLOW_LED_OFF

    {% set is_parked = printer["gcode_macro PARK_FOR_PAUSE"].is_parked|int %}
    {% if is_parked == 1 %}
        {% if printer.extruder.can_extrude %}
            RESTORE_GCODE_STATE NAME=pause_state MOVE=1 MOVE_SPEED=200
            SET_GCODE_VARIABLE MACRO=PARK_FOR_PAUSE VARIABLE=is_parked VALUE=0
            RESPOND TYPE=command MSG="RESUME: returned to pause position"
        {% else %}
            { action_raise_error("RESUME aborted: extruder too cold - heat up and retry") }
        {% endif %}
    {% endif %}

    RESUME_BASE {rawparams}

[gcode_macro CANCEL_PRINT]
description: Cancel print, lower bed, move to center, turn off heaters, LED red
rename_existing: CANCEL_PRINT_BASE
gcode:
    {% set v = printer["gcode_macro _PAUSE_RESUME_VARIABLES"] %}
    
    # LEDs immediate feedback
    RED_LED_ON
    GREEN_LED_OFF
    YELLOW_LED_OFF
    
    # Reset parked flag (no RESTORE needed: print is cancelled)
    {% set is_parked = printer["gcode_macro PARK_FOR_PAUSE"].is_parked|int %}
    {% if is_parked == 1 %}
        SET_GCODE_VARIABLE MACRO=PARK_FOR_PAUSE VARIABLE=is_parked VALUE=0
    {% endif %}
    
    # Quick retract if hot AND not already parked (avoid double retract)
    {% if printer.extruder.can_extrude and is_parked == 0 %}
        G91
        G1 E-{v.retract_pause} F{v.speed_retract}
        G90
    {% endif %}
    
    # Cancel the print
    CANCEL_PRINT_BASE
    
    # Turn off heaters
    TURN_OFF_HEATERS
    
    # If Z homed: lower bed then move to center for easy access
    {% if 'z' in printer.toolhead.homed_axes %}
        G90
        G1 Z{v.cancel_z_drop} F{v.speed_park_z}
        {% if 'x' in printer.toolhead.homed_axes 
                and 'y' in printer.toolhead.homed_axes %}
            G1 X{v.cancel_x} Y{v.cancel_y} F{v.speed_park_xy}
        {% endif %}
    {% endif %}
    
    RESPOND TYPE=command MSG="Print cancelled - bed lowered for access"


# ─── Status LEDs ───────────────────────────────────────

[gcode_macro RED_LED_ON]
gcode:
  SET_PIN PIN=red_pin VALUE=1

[gcode_macro RED_LED_OFF]
gcode:
  SET_PIN PIN=red_pin VALUE=0

[gcode_macro GREEN_LED_ON]
gcode:
  SET_PIN PIN=green_pin VALUE=1

[gcode_macro GREEN_LED_OFF]
gcode:
  SET_PIN PIN=green_pin VALUE=0

[gcode_macro YELLOW_LED_ON]
gcode:
  SET_PIN PIN=yellow_pin VALUE=1

[gcode_macro YELLOW_LED_OFF]
gcode:
  SET_PIN PIN=yellow_pin VALUE=0

[gcode_macro LIGHT_LED_ON]
gcode:
  SET_PIN PIN=light_pin VALUE=1

[gcode_macro LIGHT_LED_OFF]
gcode:
  SET_PIN PIN=light_pin VALUE=0

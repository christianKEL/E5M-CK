# ═══════════════════════════════════════════════════════
# E5M-CK — macros_E5M_CK.cfg
# User macros: pause/park + filament load/unload + nozzle cleaning
# ═══════════════════════════════════════════════════════


[gcode_macro _PAUSE_RESUME_VARIABLES]
description: Centralized parameters for pause/resume/cancel/M600 macros
# ─── Park position ─────────────────────────────
variable_park_x          : -1.0       # X park (within position_min: -5)
variable_park_y          : 120.0      # Y park
variable_park_z_lift     : 100.0      # Z lift relative to current (capped at z_max-1)

# ─── Retract amounts ───────────────────────────
variable_retract_pause   : 5.0        # PARK_FOR_PAUSE anti-coulure retract

# ─── Speeds (mm/min) ───────────────────────────
variable_speed_park_xy   : 5000       # XY park move
variable_speed_park_z    : 600        # Z lift
variable_speed_retract   : 1800       # Retract feedrate

# ─── Cancel ────────────────────────────────────
variable_cancel_z_drop   : 380.0      # Bed Z when canceling (eject print)
variable_cancel_x        : 200.0      # X position after cancel (bed center)
variable_cancel_y        : 200.0      # Y position after cancel (bed center)

gcode:
  # No-op: this macro only holds variables for other macros to read.


[gcode_macro PARK]
description: Park toolhead at safe position (uses _PAUSE_RESUME_VARIABLES)
gcode:
    {% set v = printer["gcode_macro _PAUSE_RESUME_VARIABLES"] %}
    {% set xy_homed = 'x' in printer.toolhead.homed_axes
                       and 'y' in printer.toolhead.homed_axes %}
    {% if not xy_homed %}
        RESPOND TYPE=error MSG="PARK aborted: X or Y not homed"
    {% else %}
        # Z handling: lift if homed, else FORCE_MOVE down a bit
        {% if 'z' in printer.toolhead.homed_axes %}
            {% set z_max = printer.toolhead.axis_maximum.z|float %}
            {% set z_cur = printer.toolhead.position.z|float %}
            {% set z_target = [z_cur + v.park_z_lift, z_max - 1]|min %}
            G90
            G1 Z{z_target} F{v.speed_park_z}
        {% else %}
            FORCE_MOVE STEPPER=stepper_z DISTANCE=10 VELOCITY=5
            RESPOND TYPE=command MSG="PARK: Z not homed - bed lowered 10mm via FORCE_MOVE"
        {% endif %}

        # Move XY to park position
        G90
        G1 X{v.park_x} Y{v.park_y} F{v.speed_park_xy}

        RESPOND TYPE=command MSG="Parked at X{v.park_x} Y{v.park_y}"
    {% endif %}


[gcode_macro PARK_FOR_PAUSE]
description: Save state, retract, then park (use after PAUSE during a print)
variable_is_parked: 0
gcode:
    {% set v = printer["gcode_macro _PAUSE_RESUME_VARIABLES"] %}
    {% set is_parked = printer["gcode_macro PARK_FOR_PAUSE"].is_parked|int %}
    {% set is_paused = printer.pause_resume.is_paused %}
    {% set print_state = printer.print_stats.state %}
    {% set print_active = print_state in ['printing', 'paused'] %}

    {% if is_parked == 1 %}
        RESPOND TYPE=error MSG="PARK_FOR_PAUSE: already parked"
    {% elif print_active and not is_paused %}
        RESPOND TYPE=error MSG="PARK_FOR_PAUSE: call PAUSE first"
    {% elif is_paused %}
        # State: print in pause — save state, retract, park
        {% if printer.extruder.can_extrude %}
            SAVE_GCODE_STATE NAME=pause_state
            G91
            G1 E-{v.retract_pause} F{v.speed_retract}
            G90
            PARK
            SET_GCODE_VARIABLE MACRO=PARK_FOR_PAUSE VARIABLE=is_parked VALUE=1
            RESPOND TYPE=command MSG="Parked for pause - call RESUME to continue"
        {% else %}
            RESPOND TYPE=error MSG="PARK_FOR_PAUSE: extruder too cold for retract"
        {% endif %}
    {% else %}
        # State: idle — just park, no retract, no save
        PARK
        RESPOND TYPE=command MSG="Parked (idle, no retract)"
    {% endif %}


[gcode_macro LOAD_FILAMENT]
description: Load filament - aware of pause state for clean RESUME
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(220)|int %}
    {% set extrude_len = params.EXTRUDE_LEN|default(75)|int %}
    {% set is_paused = printer.pause_resume.is_paused %}
    
    {% if is_paused %}
        # In-pause mode (e.g. after M600):
        # No SAVE/RESTORE_GCODE_STATE (preserves E counter for clean RESUME)
        # No M109/M104 (stay hot from the print)
        {% if not printer.extruder.can_extrude %}
            RESPOND TYPE=error MSG="LOAD_FILAMENT: extruder too cold"
        {% else %}
            G91
            G1 E{extrude_len} F180
            G90
            RESPOND TYPE=command MSG="Filament loaded - call RESUME to continue"
        {% endif %}
    {% else %}
        # Standalone mode (out of print): full sequence with heat + cool
        SAVE_GCODE_STATE NAME=load_filament_state
        M109 S{extruder_temp}
        G91
        G1 E{extrude_len} F180
        M104 S0
        RESTORE_GCODE_STATE NAME=load_filament_state
    {% endif %}


[gcode_macro UNLOAD_FILAMENT]
description: Unload filament (heat, anti-ringing retract sequence, cool down)
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(220)|int %}
    SAVE_GCODE_STATE NAME=unload_filament_state
    M109 S{extruder_temp}
    G91
    G1 E100 F300
    G1 E-15 F3000
    G1 E-22.4700 F2400
    G1 E-6.4200 F1200
    G1 E-3.2100 F720
    G1 E5.0000 F356
    G1 E-5.0000 F384
    G1 E5.0000 F412
    G1 E-5.0000 F440
    G1 E5.0000 F467
    G1 E-5.0000 F495
    G1 E5.0000 F523
    G1 E-5.0000 F3000
    G1 E-15 F3000
    M104 S0
    RESTORE_GCODE_STATE NAME=unload_filament_state


# ─── NOZZLE CLEANING ON SILICONE BRUSH ─────────────────
# Multi-phase nozzle cleaning routine designed to leave the nozzle
# at a stable 140°C ready for SET_SCAN_FROM_TAP (tap-then-scan).
#
# Phase 1: approach the brush, heat to 180°C, run 5 zigzag passes
# Phase 2: active cooldown 180→140°C with fans full + 12 zigzag passes
# Phase 3: wait for stable 140°C, turn fans off
# Phase 4: 5 final cold brushes at 140°C
# End:     park at Z20 X0 Y50 and turn off the heater
#
# Called from the print start G-code (start_gcode_ORCA_E5M-CK.txt).
# Brush is mounted at X=-3..-2 (left of bed), Y=50..80.

[gcode_macro NOZZLE_CLEAR_ON_BRUSH]
description: Clean nozzle on silicone brush — active brushing during cooldown
gcode:
    RESPOND TYPE=command MSG="Nozzle cleaning - phase 1: brush at 180C"
    G90
    # ─── Move to brush (BEFORE heating to avoid bed oozing) ───
    G1 Z20 F600
    G1 X-3 Y50 F9000
    G1 Z5 F600
    # ─── Phase 1: heat + brush at 180°C (5 passes) ───
    M109 S180
    G1 Z2.5 F600
    {% set x_min = -3 %}
    {% set x_max = -2 %}
    {% set x_mid = -2.5 %}
    {% set y_start = 50 %}
    {% set y_end = 80 %}
    {% set steps = 8 %}
    {% set y_step = (y_end - y_start) / steps %}
    {% for i in range(5) %}
        {% if i % 2 == 0 %}
            G1 X{x_mid} Y{y_start + y_step * 1} F8000
            G1 X{x_max} Y{y_start + y_step * 2} F8000
            G1 X{x_mid} Y{y_start + y_step * 3} F8000
            G1 X{x_min} Y{y_start + y_step * 4} F8000
            G1 X{x_mid} Y{y_start + y_step * 5} F8000
            G1 X{x_max} Y{y_start + y_step * 6} F8000
            G1 X{x_mid} Y{y_start + y_step * 7} F8000
            G1 X{x_min} Y{y_end}                F8000
        {% else %}
            G1 X{x_mid} Y{y_end - y_step * 1}   F8000
            G1 X{x_min} Y{y_end - y_step * 2}   F8000
            G1 X{x_mid} Y{y_end - y_step * 3}   F8000
            G1 X{x_max} Y{y_end - y_step * 4}   F8000
            G1 X{x_mid} Y{y_end - y_step * 5}   F8000
            G1 X{x_min} Y{y_end - y_step * 6}   F8000
            G1 X{x_mid} Y{y_end - y_step * 7}   F8000
            G1 X{x_max} Y{y_start}              F8000
        {% endif %}
    {% endfor %}

    # ─── Retract before cooldown ───
    G1 Z5 F600
    G91
    G1 E-2.0 F1800
    G90

    # ─── Phase 2: active cooldown with brush ───
    RESPOND TYPE=echo MSG="Phase 2: cooling 180->140C with active brushing"
    M104 S160                                  ; non-blocking target
    SET_PIN PIN=fan0 VALUE=255                 ; front part fan full
    SET_PIN PIN=fan1 VALUE=255                 ; rear part fan full
    G1 Z2.5 F600
    # 12 zigzag passes while temperature drops
    {% for i in range(12) %}
        {% if i % 2 == 0 %}
            G1 X{x_mid} Y{y_start + y_step * 2} F8000
            G1 X{x_max} Y{y_start + y_step * 4} F8000
            G1 X{x_mid} Y{y_start + y_step * 6} F8000
            G1 X{x_min} Y{y_end}                F8000
        {% else %}
            G1 X{x_mid} Y{y_end - y_step * 2}   F8000
            G1 X{x_min} Y{y_end - y_step * 4}   F8000
            G1 X{x_mid} Y{y_end - y_step * 6}   F8000
            G1 X{x_max} Y{y_start}              F8000
        {% endif %}
    {% endfor %}

    # ─── Phase 3: stabilize at 140°C ───
    RESPOND TYPE=echo MSG="Phase 3: stabilize at 140C"
    M109 S140                                  ; blocking: wait for target
    SET_PIN PIN=fan0 VALUE=0                   ; turn off part fans
    SET_PIN PIN=fan1 VALUE=0

    # ─── Phase 4: final cold brushes at 140°C ───
    G1 Z2.5 F600
    G1 X-3 Y50 F9000
    G1 X-2 Y80 F8000
    G1 X-3 Y50 F8000
    G1 X-2 Y80 F8000
    G1 X-3 Y50 F8000

    # ─── End: park and cool ───
    G1 Z20 F600
    G1 X0 Y50 F9000
    M104 S0
    RESPOND TYPE=command MSG="Nozzle cleaning done"
